<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#214f3c" flood-opacity=".10"/></filter>
    <marker id="traffic" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#3987e8"/></marker>
    <marker id="service" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#ef9b42"/></marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;text-anchor:middle;fill:#19392e}
      .title{font-size:15px;font-weight:700}.small{font-size:12px;font-weight:500;fill:#758980}.micro{font-size:11px;font-weight:600;fill:#61776e}.module{font-size:12px;font-weight:650}.legend{font-size:12px;font-weight:600;fill:#687e75}
    </style>
  </defs>
  <rect x="116" y="36" width="590" height="232" rx="24" fill="#edf5f1" stroke="#bfd2ca" stroke-width="1.5" stroke-dasharray="7 7"/>
  <text class="micro" x="270" y="62">现有局域网 · Wi-Fi 或以太网</text>

  <g filter="url(#shadow)">
    <rect x="14" y="126" width="94" height="82" rx="18" fill="#fff" stroke="#c6d7d0" stroke-width="2"/>
    <text class="title" x="61" y="160">Internet</text><text class="small" x="61" y="184">公网</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="154" y="105" width="132" height="124" rx="20" fill="#fff" stroke="#b9d0c7" stroke-width="2"/>
    <circle cx="176" cy="128" r="6" fill="#94a9a1"/>
    <text class="title" x="220" y="135">主路由 / AP</text>
    <path d="M184 159h72" stroke="#d8e5df"/>
    <text class="small" x="220" y="181">DHCP 关闭</text><text class="small" x="220" y="204">LAN 地址保留</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="326" y="78" width="190" height="176" rx="24" fill="#e3f4ec" stroke="#42a97f" stroke-width="3"/>
    <circle cx="350" cy="103" r="7" fill="#42a97f"/>
    <text class="title" x="421" y="110">Mac / OpenSurge</text>
    <rect x="346" y="132" width="150" height="47" rx="12" fill="#f7fcf9" stroke="#69b994" stroke-width="1.5"/>
    <text class="module" x="421" y="160">DHCP + DNS</text>
    <rect x="346" y="190" width="150" height="47" rx="12" fill="#f7fcf9" stroke="#69b994" stroke-width="1.5"/>
    <text class="module" x="421" y="211">TUN + 规则</text><text class="small" x="421" y="228">NAT / 转发</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="558" y="94" width="136" height="144" rx="22" fill="#fff8f1" stroke="#ef9b62" stroke-width="2.5"/>
    <text class="title" x="626" y="128">局域网设备</text>
    <text class="small" x="626" y="156">手机 · 电视</text><text class="small" x="626" y="178">游戏机 · IoT</text>
    <rect x="577" y="195" width="98" height="26" rx="13" fill="#fff" stroke="#f3c49a"/>
    <text class="micro" x="626" y="213">自动获取设置</text>
  </g>

  <path d="M558 190H518" fill="none" stroke="#3987e8" stroke-width="4" stroke-linecap="round" marker-end="url(#traffic)"/>
  <path d="M326 190H288" fill="none" stroke="#3987e8" stroke-width="4" stroke-linecap="round" marker-end="url(#traffic)"/>
  <path d="M154 167H110" fill="none" stroke="#3987e8" stroke-width="4" stroke-linecap="round" marker-end="url(#traffic)"/>
  <path d="M496 151C526 119 544 119 558 137" fill="none" stroke="#ef9b42" stroke-width="3" stroke-dasharray="7 6" stroke-linecap="round" marker-end="url(#service)"/>
  <g>
    <rect x="488" y="77" width="151" height="28" rx="14" fill="#fff3e6" stroke="#f2be87"/>
    <circle cx="505" cy="91" r="4" fill="#ef9b42"/><text class="micro" x="566" y="95">自动下发 DHCP / DNS</text>
  </g>

  <g transform="translate(152 310)"><path d="M0 0h38" stroke="#3987e8" stroke-width="4"/><text class="legend" x="92" y="5">设备上网路径</text></g>
  <g transform="translate(378 310)"><path d="M0 0h38" stroke="#ef9b42" stroke-width="3" stroke-dasharray="7 6"/><text class="legend" x="92" y="5">DHCP / DNS</text></g>
</svg>

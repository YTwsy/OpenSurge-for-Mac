gateway:
  interface: "en0"
  lan_ip: "192.168.50.1"
  upstream_interface: "en0"

dhcp:
  binary: "dnsmasq"
  enabled: true
  range_start: "192.168.50.100"
  range_end: "192.168.50.200"
  lease_time: "12h"
  domain: "lan"

dns:
  listen: "192.168.50.1"
  port: 53
  upstream: ""

mihomo:
  binary: "./bin/mihomo"
  config: "./runtime/mihomo.yaml"
  mixed_port: 7890
  # macOS transparent proxying uses transparent.mode: "tun"; redir must stay 0.
  redir_port: 0
  api_addr: "127.0.0.1:9090"
  secret: ""

pf:
  anchor_name: "com.apple/open_mihomo_gateway"
  # PF TCP redirection is not supported on macOS; TUN is the transparent path.
  redirect_tcp_to: 0

transparent:
  mode: "off"
  tun_device: "utun123"
  tun_stack: "mixed"
  tun_auto_route: true
  tun_auto_detect_interface: false
  tun_strict_route: false

runtime:
  dir: "./runtime"

minimumLimaVersion: 2.0.0

images:
  - location: "https://cloud-images.ubuntu.com/releases/noble/release-20260518/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64
    digest: sha256:6a61b967ba4a27dd1966f835a67643073ed55c2860ce3dc1cb0517282e6b8bec

vmType: vz
arch: aarch64
cpus: 1
memory: 512MiB
disk: 4GiB

mounts: []

containerd:
  system: false
  user: false

ssh:
  overVsock: true

user:
  name: lima
  comment: Lima lab client
  shell: /bin/bash

# The built-in user-mode NIC remains the control plane. This second NIC is the
# data plane and connects to the DHCP-free host network managed by socket_vmnet.
networks:
  - socket: /private/var/run/open-mihomo-gateway-lab.sock
    interface: omg0

provision:
  - mode: system
    script: |
      #!/bin/sh
      set -eux
__PROXY_EXPORTS__
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends bash curl dnsutils iproute2 iputils-ping isc-dhcp-client
      rm -rf /var/lib/apt/lists/*

  - mode: data
    path: /usr/local/bin/omg-lab-client
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
__PROXY_EXPORTS__
      export DEBIAN_FRONTEND=noninteractive

      gateway="${2:-192.168.50.1}"

      control_interface() {
        ip -4 route show default | awk 'NR == 1 { print $5 }'
      }

      lab_interface() {
        local control iface
        if [[ -d /sys/class/net/omg0 ]]; then
          printf 'omg0\n'
          return 0
        fi
        control="$(control_interface)"
        for path in /sys/class/net/*; do
          iface="${path##*/}"
          if [[ "$iface" != "lo" && "$iface" != "$control" ]]; then
            printf '%s\n' "$iface"
            return 0
          fi
        done
        echo "no lab interface found" >&2
        return 1
      }

      request_dhcp_with_networkd() {
        local iface i
        iface="$1"
        command -v networkctl >/dev/null 2>&1 || {
          echo "no DHCP client found and networkctl is unavailable" >&2
          return 1
        }
        mkdir -p /etc/systemd/network
        {
          printf '[Match]\n'
          printf 'Name=%s\n\n' "$iface"
          printf '[Network]\n'
          printf 'DHCP=ipv4\n'
          printf 'IPv6AcceptRA=no\n'
          printf 'LinkLocalAddressing=no\n\n'
          printf '[DHCPv4]\n'
          printf 'UseDNS=false\n'
          printf 'UseRoutes=false\n'
          printf 'ClientIdentifier=mac\n'
        } >/etc/systemd/network/90-open-mihomo-gateway-lab.network
        systemctl enable --now systemd-networkd >/dev/null 2>&1 || true
        networkctl reload >/dev/null 2>&1 || true
        networkctl reconfigure "$iface" >/dev/null 2>&1 || true
        networkctl renew "$iface" >/dev/null 2>&1 || true
        for i in {1..30}; do
          if ip -4 address show dev "$iface" scope global | grep -q 'inet '; then
            return 0
          fi
          sleep 1
        done
        echo "timed out waiting for DHCP lease on $iface via systemd-networkd" >&2
        return 1
      }

      request_dhcp() {
        local iface
        iface="$1"
        if command -v udhcpc >/dev/null 2>&1; then
          timeout 35 udhcpc -i "$iface" -n -q -t 5 -T 5
        elif command -v dhclient >/dev/null 2>&1; then
          timeout 35 dhclient -4 -v -1 "$iface"
        else
          request_dhcp_with_networkd "$iface"
        fi
      }

      renew() {
        local iface
        iface="$(lab_interface)"
        ip link set dev "$iface" up
        ip -4 addr flush dev "$iface" scope global || true
        request_dhcp "$iface"
        ip route replace default via "$gateway" dev "$iface" metric 5
        rm -f /etc/resolv.conf
        printf 'nameserver %s\n' "$gateway" >/etc/resolv.conf
        printf 'LAB_INTERFACE=%s\n' "$iface"
        ip -4 -brief address show dev "$iface"
        ip -4 route show default
      }

      status() {
        local iface
        iface="$(lab_interface)"
        printf 'CONTROL_INTERFACE=%s\n' "$(control_interface)"
        printf 'LAB_INTERFACE=%s\n' "$iface"
        ip -4 -brief address show dev "$iface"
        ip -4 route show default
        cat /etc/resolv.conf
      }

      test_path() {
        local host iface port proxy_url real_ip route scheme test_url
        iface="$(lab_interface)"
        test_url="${3:-https://example.com/}"
        proxy_url="http://$gateway:17890"
        scheme="${test_url%%:*}"
        host="${test_url#*://}"
        host="${host%%/*}"
        if [[ "$host" == *:* ]]; then
          port="${host##*:}"
          host="${host%%:*}"
        elif [[ "$scheme" == "https" ]]; then
          port=443
        else
          port=80
        fi
        route="$(ip -4 route get 1.1.1.1)"
        grep -q "via $gateway" <<<"$route"
        grep -q "dev $iface" <<<"$route"
        dig +time=5 +tries=1 "@$gateway" "$host" A
        ping -c 1 -W 5 1.1.1.1
        # Managed mihomo DNS intentionally returns fake IPs even when TUN is
        # disabled. Resolve a real A record only for the direct NAT proof so
        # that this check does not incorrectly depend on transparent routing.
        real_ip="$(dig +time=5 +tries=1 +short @1.1.1.1 "$host" A | awk '/^[0-9]+([.][0-9]+){3}$/ { print; exit }')"
        [[ -n "$real_ip" ]]
        curl --noproxy '*' --resolve "$host:$port:$real_ip" --fail --silent --show-error --max-time 20 "$test_url" >/dev/null
        curl --noproxy '' --proxy "$proxy_url" --fail --silent --show-error --max-time 20 "$test_url" >/dev/null
        printf 'CLIENT_PATH_OK interface=%s gateway=%s direct=%s proxy=%s url=%s\n' "$iface" "$gateway" "$real_ip" "$proxy_url" "$test_url"
      }

      transparent_test() {
        local host iface route test_url
        iface="$(lab_interface)"
        test_url="${3:-https://example.com/}"
        host="${test_url#*://}"
        host="${host%%/*}"
        host="${host%%:*}"
        route="$(ip -4 route get 1.1.1.1)"
        grep -q "via $gateway" <<<"$route"
        grep -q "dev $iface" <<<"$route"
        dig +time=5 +tries=1 "@$gateway" "$host" A
        curl --noproxy '*' --fail --silent --show-error --max-time 20 "$test_url" >/dev/null
        printf 'CLIENT_TRANSPARENT_OK interface=%s gateway=%s host=%s url=%s\n' "$iface" "$gateway" "$host" "$test_url"
      }

      udp_probe() {
        local iface route target port
        iface="$(lab_interface)"
        target="${3:-1.1.1.1}"
        port="${4:-443}"
        route="$(ip -4 route get "$target")"
        grep -q "via $gateway" <<<"$route"
        grep -q "dev $iface" <<<"$route"
        printf 'open-surge-udp\n' >"/dev/udp/$target/$port"
        printf 'CLIENT_UDP_PROBE_SENT interface=%s gateway=%s target=%s:%s\n' "$iface" "$gateway" "$target" "$port"
      }

      case "${1:-}" in
        renew) renew ;;
        status) status ;;
        test) test_path ;;
        transparent) transparent_test ;;
        udp) udp_probe "$@" ;;
        *) echo "usage: omg-lab-client <renew|status|test|transparent|udp> [gateway] [target] [port]" >&2; exit 2 ;;
      esac

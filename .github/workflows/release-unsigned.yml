name: Unsigned macOS release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: unsigned-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.arch }} package
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x86_64
    env:
      OPENSURGE_APP_ARCH: ${{ matrix.arch }}
      OPENSURGE_RELEASE_ARCH: ${{ matrix.arch }}
      OPENSURGE_MINIMUM_MACOS: "13.0"
      RELEASE_ARCH: ${{ matrix.arch }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require a release tag on master
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          git fetch origin master --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master || {
            echo "release tag is not reachable from origin/master" >&2
            exit 1
          }
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        run: npm install --global pnpm@11.9.0

      - name: Install Web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Prepare pinned runtime dependencies
        run: ./scripts/prepare-gui-release-deps.sh

      - name: Run GUI release checks
        env:
          GOCACHE: ${{ runner.temp }}/go-build-cache
        run: make gui-test

      - name: Build and verify unsigned installer
        id: package
        shell: bash
        env:
          GOCACHE: ${{ runner.temp }}/go-build-cache
          OPENSURGE_VERSION: ${{ steps.version.outputs.version }}
          OPENSURGE_BUILD_NUMBER: ${{ github.run_number }}
          OPENSURGE_MIHOMO_BINARY: ${{ github.workspace }}/runtime/release-tools/bin/mihomo
          OPENSURGE_DNSMASQ_BINARY: ${{ github.workspace }}/runtime/release-tools/bin/dnsmasq
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          make gui-installer
          release_dir="$GITHUB_WORKSPACE/artifacts/release"
          release_pkg="$release_dir/OpenSurge-for-Mac-${OPENSURGE_VERSION}-${RELEASE_ARCH}-unsigned.pkg"
          mkdir -p "$release_dir"
          mv "$GITHUB_WORKSPACE/artifacts/gui-installer/OpenSurge-for-Mac-${OPENSURGE_VERSION}.pkg" "$release_pkg"
          ./scripts/verify-unsigned-gui-installer.sh "$release_pkg" "$OPENSURGE_VERSION" "$RELEASE_ARCH"
          echo "pkg=$release_pkg" >>"$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.pkg }}

      - name: Preserve architecture package
        uses: actions/upload-artifact@v7
        with:
          name: OpenSurge-for-Mac-${{ steps.version.outputs.version }}-${{ env.RELEASE_ARCH }}-unsigned
          path: ${{ steps.package.outputs.pkg }}
          if-no-files-found: error

  publish:
    name: Publish stable GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Download architecture packages
        uses: actions/download-artifact@v8
        with:
          pattern: OpenSurge-for-Mac-*-unsigned
          path: artifacts/release
          merge-multiple: true

      - name: Create combined checksums
        shell: bash
        run: |
          cd artifacts/release
          sha256sum OpenSurge-for-Mac-*-unsigned.pkg >SHA256SUMS

      - name: Create stable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_dir="$GITHUB_WORKSPACE/artifacts/release"
          gh release create "$GITHUB_REF_NAME" \
            "$release_dir/OpenSurge-for-Mac-${GITHUB_REF_NAME#v}-arm64-unsigned.pkg#Unsigned Apple Silicon installer" \
            "$release_dir/OpenSurge-for-Mac-${GITHUB_REF_NAME#v}-x86_64-unsigned.pkg#Unsigned Intel installer" \
            "$release_dir/SHA256SUMS#SHA-256 checksums" \
            --verify-tag \
            --latest \
            --title "OpenSurge for Mac $GITHUB_REF_NAME" \
            --notes-file packaging/unsigned-release-notes.md
